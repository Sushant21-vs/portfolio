<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects - Sushant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
    }

    nav a:hover {
      color: #0077ff;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 60px 20px;
    }

    .header h1 {
      font-size: 2.5rem;
    }

    /* GRID */
    .projects {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #ddd;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card h3 {
      margin: 15px 0 10px;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #0077ff;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: white;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
